spring:
  application:
    name: opensourceiq-backend
  datasource:
    url: jdbc:h2:mem:opensourceiq;DB_CLOSE_DELAY=-1
    username: sa
    password: password
    driverClassName: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test
            client-secret: test

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000 # 1 day

github:
  client-id: ${GITHUB_CLIENT_ID:test}
  client-secret: ${GITHUB_CLIENT_SECRET:test}
